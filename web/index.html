<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦐 虾人情报站 v3</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --orange: #d29922;
  --red: #f85149; --purple: #bc8cff; --cyan: #39d353;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }

/* ── Header ── */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 1.5rem; }
.logo-text h1 { font-size: 1rem; font-weight: 700; }
.logo-text .sub { font-size: .68rem; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.refresh-btn { background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.3); color: var(--accent); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: .78rem; transition: background .2s; }
.refresh-btn:hover { background: rgba(88,166,255,.2); }
.last-update { font-size: .7rem; color: var(--muted); }

/* ── Stats Bar ── */
.stats-bar { display: flex; gap: 12px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 130px; flex-shrink: 0; }
.stat-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.stat-value { font-size: 1.3rem; font-weight: 700; }
.stat-sub { font-size: .65rem; color: var(--muted); margin-top: 2px; }

/* ── Tabs ── */
.tabs { display: flex; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; gap: 0; }
.tab { padding: 10px 16px; cursor: pointer; font-size: .82rem; color: var(--muted); border-bottom: 2px solid transparent; transition: color .2s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Content ── */
.content { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── Filter Bar ── */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-label { font-size: .75rem; color: var(--muted); flex-shrink: 0; }
.filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 3px 11px; border-radius: 20px; cursor: pointer; font-size: .73rem; transition: all .18s; }
.filter-btn:hover, .filter-btn.active { background: rgba(88,166,255,.12); border-color: var(--accent); color: var(--accent); }

/* ── GitHub Repo Card ── */
.repo-list { display: flex; flex-direction: column; gap: 8px; }
.repo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px; transition: border-color .2s; }
.repo-card:hover { border-color: rgba(88,166,255,.4); }
.repo-rank { font-size: .88rem; font-weight: 700; color: var(--muted); min-width: 28px; text-align: center; padding-top: 2px; flex-shrink: 0; }
.repo-rank.top3 { color: var(--orange); }
.repo-info { flex: 1; min-width: 0; }
.repo-name { font-weight: 600; color: var(--accent); text-decoration: none; font-size: .92rem; }
.repo-name:hover { text-decoration: underline; }
.repo-desc { font-size: .80rem; color: var(--muted); margin-top: 4px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.repo-summary { font-size: .76rem; color: #a0aab5; margin-top: 4px; line-height: 1.4; font-style: italic; }
.repo-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.repo-tag { font-size: .63rem; background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.18); color: var(--accent); padding: 1px 7px; border-radius: 8px; }
.repo-meta { display: flex; align-items: center; gap: 12px; margin-top: 7px; flex-wrap: wrap; }
.repo-lang { font-size: .73rem; color: var(--text); display: flex; align-items: center; gap: 4px; }
.lang-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.repo-stars { font-size: .73rem; color: var(--muted); }
.repo-today { font-size: .73rem; font-weight: 600; color: var(--green); background: rgba(63,185,80,.1); padding: 1px 8px; border-radius: 10px; }
.repo-score { font-size: .70rem; color: var(--muted); }
.repo-score.hi { color: var(--green); }
.repo-time { font-size: .67rem; color: var(--muted); }
.pushed-mark { font-size: .65rem; color: var(--green); }

/* ── News/Info Card Grid ── */
.cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: start; }
@media (max-width: 1200px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 860px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px)  { .cards-grid { grid-template-columns: 1fr; } }

.news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color .2s; display: flex; flex-direction: column; gap: 0; min-height: 160px; }
.news-card:hover { border-color: rgba(88,166,255,.4); }

/* 卡片头部：来源 + Score */
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; flex-shrink: 0; }
.card-source { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--orange); }
.card-score { font-size: .65rem; font-weight: 700; padding: 1px 6px; border-radius: 6px; flex-shrink: 0; }
.card-score.hi   { background: rgba(63,185,80,.15);  color: var(--green); }
.card-score.mid  { background: rgba(210,153,34,.15); color: var(--orange); }
.card-score.low  { background: rgba(139,148,158,.1); color: var(--muted); }

/* 卡片标题 */
.card-title { font-size: .83rem; font-weight: 600; line-height: 1.38; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex-shrink: 0; margin-bottom: 6px; }
.card-title a { color: var(--text); text-decoration: none; }
.card-title a:hover { color: var(--accent); }

/* 摘要 */
.card-summary { font-size: .75rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex: 1; margin-bottom: 8px; }

/* 标签 */
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; flex-shrink: 0; }
.card-tag { font-size: .62rem; background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.15); color: var(--accent); padding: 1px 6px; border-radius: 8px; }

/* 卡片底部：时间 + 推送标记 */
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; flex-shrink: 0; }
.card-time { font-size: .65rem; color: var(--muted); }
.card-pushed { font-size: .62rem; color: var(--green); background: rgba(63,185,80,.1); padding: 1px 6px; border-radius: 8px; }

/* ── Tasks Panel ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stats-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
.stats-block h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: .8rem; }
.stats-row:last-child { border-bottom: none; }
.stats-row .val { font-weight: 600; color: var(--accent); }
.stats-row .val.ok { color: var(--green); }
.stats-row .val.err { color: var(--red); }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-row { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
.task-badge { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }
.task-badge.done    { background: rgba(63,185,80,.15);  color: var(--green); }
.task-badge.running { background: rgba(88,166,255,.15); color: var(--accent); }
.task-badge.failed  { background: rgba(248,81,73,.15);  color: var(--red); }
.task-id   { font-size: .7rem; color: var(--muted); font-family: monospace; }
.task-type { font-size: .72rem; color: var(--muted); }
.task-time { font-size: .72rem; color: var(--muted); flex: 1; text-align: right; }
.task-dur  { font-size: .7rem; color: var(--muted); min-width: 60px; text-align: right; }
.section-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 20px 0 10px; }

/* ── Loading / Empty ── */
.loading { text-align: center; padding: 48px; color: var(--muted); font-size: .88rem; }
.loading::after { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 48px; color: var(--muted); }
.load-more { text-align: center; margin-top: 16px; }
.load-more-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 7px 22px; border-radius: 6px; cursor: pointer; font-size: .8rem; transition: all .2s; }
.load-more-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🦐</span>
    <div class="logo-text">
      <h1>虾人情报站 v3</h1>
      <div class="sub">AI &amp; Tech Intelligence Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">加载中...</span>
    <button class="refresh-btn" onclick="refreshAll()">↻ 刷新</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-label">AI 技术动态</div><div class="stat-value" id="s-ai">-</div><div class="stat-sub">条待推送</div></div>
  <div class="stat-card"><div class="stat-label">GitHub 热门</div><div class="stat-value" id="s-gh">-</div><div class="stat-sub">条待推送</div></div>
  <div class="stat-card"><div class="stat-label">股市信息</div><div class="stat-value" id="s-stock">-</div><div class="stat-sub">条待推送</div></div>
  <div class="stat-card"><div class="stat-label">最近任务</div><div class="stat-value" id="s-task" style="font-size:.9rem;padding-top:4px">-</div><div class="stat-sub" id="s-task-time">-</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('ai',this)">🤖 AI 技术动态</div>
  <div class="tab" onclick="switchTab('github',this)">🔥 GitHub 热门</div>
  <div class="tab" onclick="switchTab('stock',this)">📈 股市信息</div>
  <div class="tab" onclick="switchTab('tasks',this)">📋 任务追踪</div>
</div>

<div class="content">

  <!-- AI 技术动态 -->
  <div class="panel active" id="panel-ai">
    <div class="filter-bar">
      <span class="filter-label">状态：</span>
      <button class="filter-btn" onclick="setFilter('ai','pending',this)">待推送</button>
      <button class="filter-btn active" onclick="setFilter('ai','pushed',this)">已推送</button>
    </div>
    <div class="cards-grid" id="aiList"><div class="loading" style="grid-column:1/-1">加载中</div></div>
    <div class="load-more"><button class="load-more-btn" id="aiMore" style="display:none" onclick="loadMore('ai')">加载更多</button></div>
  </div>

  <!-- GitHub 热门 -->
  <div class="panel" id="panel-github">
    <div class="filter-bar">
      <span class="filter-label">状态：</span>
      <button class="filter-btn" onclick="setFilter('github','pending',this)">待推送</button>
      <button class="filter-btn active" onclick="setFilter('github','pushed',this)">已推送</button>
      <span class="filter-label" style="margin-left:8px">语言：</span>
      <button class="filter-btn active" id="gh-lang-all" onclick="setGhLang('',this)">全部</button>
      <button class="filter-btn" onclick="setGhLang('Python',this)">Python</button>
      <button class="filter-btn" onclick="setGhLang('TypeScript',this)">TypeScript</button>
      <button class="filter-btn" onclick="setGhLang('JavaScript',this)">JavaScript</button>
      <button class="filter-btn" onclick="setGhLang('Go',this)">Go</button>
      <button class="filter-btn" onclick="setGhLang('Rust',this)">Rust</button>
    </div>
    <div class="repo-list" id="ghList"><div class="loading">加载中</div></div>
    <div class="load-more"><button class="load-more-btn" id="ghMore" style="display:none" onclick="loadMore('github')">加载更多</button></div>
  </div>

  <!-- 股市信息 -->
  <div class="panel" id="panel-stock">
    <div class="filter-bar">
      <span class="filter-label">状态：</span>
      <button class="filter-btn" onclick="setFilter('stock','pending',this)">待推送</button>
      <button class="filter-btn active" onclick="setFilter('stock','pushed',this)">已推送</button>
    </div>
    <div class="cards-grid" id="stockList"><div class="loading" style="grid-column:1/-1">加载中</div></div>
    <div class="load-more"><button class="load-more-btn" id="stockMore" style="display:none" onclick="loadMore('stock')">加载更多</button></div>
  </div>

  <!-- 任务追踪 -->
  <div class="panel" id="panel-tasks">
    <div class="stats-grid" id="taskStats"><div class="loading">加载中</div></div>
    <div class="section-label">最近任务</div>
    <div class="task-list" id="taskList"><div class="loading">加载中</div></div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────
const state = {
  ai:     { data: [], pushed: true, page: 20, channel: 'AI技术动态' },
  github: { data: [], pushed: true, page: 20, channel: 'GitHub热门项目' },
  stock:  { data: [], pushed: true, page: 20, channel: '股市信息' },
};
let ghLang = '';

// ── Constants ────────────────────────────────
const LANG_COLORS = {
  Python:'#3572A5', TypeScript:'#2b7489', JavaScript:'#f1e05a',
  Go:'#00ADD8', Rust:'#dea584', Java:'#b07219', 'C++':'#f34b7d',
  Shell:'#89e051', Ruby:'#701516', Swift:'#ffac45', Markdown:'#083fa1',
  Jupyter:'#DA5B0B', CSS:'#563d7c', 'C#':'#178600', Kotlin:'#A97BFF',
};

const SOURCE_LABELS = {
  techcrunch_rss:'TechCrunch', theverge_rss:'The Verge', mit_rss:'MIT Tech Review',
  wired_rss:'Wired', ars_rss:'Ars Technica', arxiv_ai_rss:'ArXiv AI',
  arxiv_lg_rss:'ArXiv ML', '36kr_rss':'36Kr', infoq_rss:'InfoQ',
  bloomberg_rss:'Bloomberg', wsj_rss:'WSJ', skynews_rss:'Sky News',
  nytimes_rss:'NYTimes', huxiu_rss:'虎嗅', ifanr_rss:'爱范儿',
  economist_rss:'Economist', hn_api:'Hacker News', github_trending:'GitHub',
};

// ── Utils ─────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 60)    return `${Math.floor(d)}秒前`;
  if (d < 3600)  return `${Math.floor(d/60)}分钟前`;
  if (d < 86400) return `${Math.floor(d/3600)}小时前`;
  return `${Math.floor(d/86400)}天前`;
}

function scoreClass(s) {
  if (s == null) return 'low';
  if (s >= 0.75) return 'hi';
  if (s >= 0.60) return 'mid';
  return 'low';
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Status Bar ───────────────────────────────
async function loadStatus() {
  try {
    const d = await fetchJSON('status');
    const pending = d.pending_push || [];
    const map = {};
    for (const p of pending) map[p.channel_name] = p.pending;
    document.getElementById('s-ai').textContent    = map['AI技术动态']    ?? '-';
    document.getElementById('s-gh').textContent    = map['GitHub热门项目'] ?? '-';
    document.getElementById('s-stock').textContent = map['股市信息']       ?? '-';

    const tasks = d.recent_tasks || [];
    if (tasks.length) {
      const t = tasks[0];
      const el = document.getElementById('s-task');
      el.textContent = t.status;
      el.style.color = t.status === 'done' ? 'var(--green)' : t.status === 'failed' ? 'var(--red)' : 'var(--orange)';
      document.getElementById('s-task-time').textContent = timeAgo(t.started_at);
      document.getElementById('lastUpdate').textContent = '更新：' + timeAgo(t.started_at);
    }
  } catch(e) { console.warn('status error:', e); }
}

// ── Channel Loader ────────────────────────────
async function loadChannel(key) {
  const s = state[key];
  const listEl = document.getElementById(key === 'github' ? 'ghList' : key + 'List');
  const moreEl = document.getElementById(key === 'github' ? 'ghMore' : key + 'More');
  listEl.innerHTML = key === 'github'
    ? '<div class="loading">加载中</div>'
    : '<div class="loading" style="grid-column:1/-1">加载中</div>';

  try {
    const pushed = s.pushed ? 'true' : 'false';
    const ch = encodeURIComponent(s.channel);
    s.data = await fetchJSON(`channels/${ch}/items?limit=80&pushed=${pushed}`);
    renderChannel(key);
  } catch(e) {
    listEl.innerHTML = `<div class="empty" ${key !== 'github' ? 'style="grid-column:1/-1"' : ''}>加载失败: ${e.message}</div>`;
  }
}

function renderChannel(key) {
  const s = state[key];
  const listEl = document.getElementById(key === 'github' ? 'ghList' : key + 'List');
  const moreEl = document.getElementById(key === 'github' ? 'ghMore' : key + 'More');

  let data = s.data;
  // GitHub 语言过滤
  if (key === 'github' && ghLang) {
    data = data.filter(item => ((item.metadata && item.metadata.language) || '').toLowerCase() === ghLang.toLowerCase());
  }

  const show = data.slice(0, s.page);
  if (!show.length) {
    listEl.innerHTML = key === 'github'
      ? '<div class="empty">暂无数据</div>'
      : '<div class="empty" style="grid-column:1/-1">暂无数据</div>';
    moreEl.style.display = 'none';
    return;
  }

  if (key === 'github') {
    listEl.innerHTML = show.map((item, i) => renderRepoCard(item, i)).join('');
  } else {
    listEl.innerHTML = show.map(item => renderNewsCard(item)).join('');
  }
  moreEl.style.display = data.length > s.page ? 'inline-block' : 'none';
}

// ── Repo Card ─────────────────────────────────
function renderRepoCard(item, idx) {
  const meta    = item.metadata || {};
  const lang    = meta.language || '';
  const color   = LANG_COLORS[lang] || '#8b949e';
  const starsT  = (meta.stars_total || 0).toLocaleString();
  const starsD  = meta.stars_today || 0;
  const tags    = item.analysis_tags || item.routing_tags || [];
  const score   = item.relevance_score;
  const desc    = item.content || '';  // GitHub 的 content 存的是描述
  const summary = item.summary || '';

  return `<div class="repo-card">
    <div class="repo-rank ${idx < 3 ? 'top3' : ''}">#${idx+1}</div>
    <div class="repo-info">
      <a class="repo-name" href="${item.url||'#'}" target="_blank">${item.title}</a>
      ${desc    ? `<div class="repo-desc">${esc(desc)}</div>` : ''}
      ${summary ? `<div class="repo-summary">💡 ${esc(summary)}</div>` : ''}
      ${tags.length ? `<div class="repo-tags">${tags.map(t=>`<span class="repo-tag">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="repo-meta">
        ${lang ? `<span class="repo-lang"><span class="lang-dot" style="background:${color}"></span>${lang}</span>` : ''}
        <span class="repo-stars">⭐ ${starsT}</span>
        ${starsD ? `<span class="repo-today">+${starsD.toLocaleString()} 今日</span>` : ''}
        ${score != null ? `<span class="repo-score ${score>=0.75?'hi':''}">相关度 ${Math.round(score*100)}%</span>` : ''}
        <span class="repo-time">${timeAgo(item.routed_at)}</span>
        ${item.pushed ? '<span class="pushed-mark">✓ 已推送</span>' : ''}
      </div>
    </div>
  </div>`;
}

// ── News Card ─────────────────────────────────
function renderNewsCard(item) {
  const srcRaw  = item.source_name || '';
  const srcName = SOURCE_LABELS[srcRaw] || srcRaw;
  const tags    = item.analysis_tags || item.routing_tags || [];
  const summary = item.summary || '';
  const score   = item.relevance_score;
  const cls     = scoreClass(score);
  const scoreStr = score != null ? `${Math.round(score*100)}%` : '';

  return `<div class="news-card">
    <div class="card-header">
      <span class="card-source">${esc(srcName)}</span>
      ${scoreStr ? `<span class="card-score ${cls}">${scoreStr}</span>` : ''}
    </div>
    <div class="card-title"><a href="${item.url||'#'}" target="_blank">${esc(item.title||'无标题')}</a></div>
    ${summary ? `<div class="card-summary">${esc(summary)}</div>` : ''}
    ${tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    <div class="card-footer">
      <span class="card-time">${timeAgo(item.routed_at)}</span>
      ${item.pushed ? '<span class="card-pushed">✓ 已推送</span>' : ''}
    </div>
  </div>`;
}

// ── Tasks ─────────────────────────────────────
async function loadTasks() {
  try {
    const [statusData, taskList] = await Promise.all([
      fetchJSON('status'),
      fetchJSON('tasks?limit=20'),
    ]);
    const phaseNames = { collect:'采集', analyze:'LLM分析', route:'路由', push:'推送' };
    const stats = statusData.phase_stats_24h || [];
    document.getElementById('taskStats').innerHTML = stats.length
      ? stats.map(s => `<div class="stats-block">
          <h3>${phaseNames[s.phase]||s.phase} (24h)</h3>
          <div class="stats-row"><span>处理</span><span class="val">${s.total||0}</span></div>
          <div class="stats-row"><span>成功</span><span class="val ok">${s.success||0}</span></div>
          <div class="stats-row"><span>失败</span><span class="val ${(s.failed||0)>0?'err':''}">${s.failed||0}</span></div>
        </div>`).join('')
      : '<div class="empty">暂无统计</div>';

    document.getElementById('taskList').innerHTML = taskList.length
      ? taskList.map(t => `<div class="task-row">
          <span class="task-badge ${t.status}">${t.status}</span>
          <span class="task-id">${t.task_id.slice(0,8)}…</span>
          <span class="task-type">${t.trigger_type||'cron'}</span>
          <span class="task-time">${timeAgo(t.started_at)}</span>
          <span class="task-dur">${t.duration_ms ? (t.duration_ms/1000).toFixed(1)+'s' : '-'}</span>
        </div>`).join('')
      : '<div class="empty">暂无记录</div>';
  } catch(e) {
    document.getElementById('taskStats').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

// ── Controls ──────────────────────────────────
function setFilter(key, mode, btn) {
  state[key].pushed = mode === 'pushed';
  state[key].page   = 20;
  const panel = document.getElementById('panel-' + (key === 'github' ? 'github' : key));
  panel.querySelectorAll('.filter-btn').forEach(b => {
    if (b.textContent === '待推送' || b.textContent === '已推送') b.classList.remove('active');
  });
  btn.classList.add('active');
  loadChannel(key);
}

function setGhLang(lang, btn) {
  ghLang = lang;
  state.github.page = 20;
  document.querySelectorAll('#panel-github .filter-btn').forEach(b => {
    if (['全部','Python','TypeScript','JavaScript','Go','Rust'].includes(b.textContent)) b.classList.remove('active');
  });
  btn.classList.add('active');
  renderChannel('github');
}

function loadMore(key) {
  state[key].page += 20;
  renderChannel(key);
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t   => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'ai'     && !state.ai.data.length)     loadChannel('ai');
  if (name === 'github' && !state.github.data.length)  loadChannel('github');
  if (name === 'stock'  && !state.stock.data.length)   loadChannel('stock');
  if (name === 'tasks') loadTasks();
}

function refreshAll() {
  document.getElementById('lastUpdate').textContent = '刷新中...';
  state.ai.data = []; state.github.data = []; state.stock.data = [];
  loadStatus();
  loadChannel('ai');
}

// ── XSS helper ────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────
loadStatus();
loadChannel('ai');
</script>
</body>
</html>
